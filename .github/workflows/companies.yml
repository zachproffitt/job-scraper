name: Companies

on:
  schedule:
    - cron: "0 0 * * 0"  # Sundays at midnight UTC
  workflow_dispatch:

concurrency:
  group: companies-pipeline
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout scraper
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure git
        run: |
          git config --global user.name "builder-jobs-bot"
          git config --global user.email "bot@builder-jobs"

      - name: Clear discovery log
        run: truncate -s 0 data/discovery.log || true

      - name: Discover YC companies
        run: PYTHONPATH=. python discovery/discover_yc_companies.py

      - name: Discover VC companies
        run: PYTHONPATH=. python discovery/discover_vc_companies.py

      - name: Discover industry companies
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: PYTHONPATH=. python discovery/discover_industry_companies.py

      - name: Detect ATS for new companies
        run: PYTHONPATH=. python discovery/discover_companies.py

      - name: Write step summary
        run: PYTHONPATH=. python pipeline/write_discovery_summary.py

      - name: Commit and push
        run: |
          git add data/company_names.txt data/companies.json data/discovery.log
          if git diff --cached --quiet; then
            echo "No new companies found"
          else
            git stash
            git pull --rebase
            git stash pop
            git add data/company_names.txt data/companies.json data/discovery.log
            git commit -m "Company discovery — $(date -u '+%b %-d at %H:%M UTC')"
            git push
          fi
