name: Jobs

on:
  schedule:
    - cron: "7 * * * *"
  workflow_dispatch:

concurrency:
  group: jobs-pipeline
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout scraper
        uses: actions/checkout@v5
        with:
          path: scraper
          token: ${{ secrets.GH_PAT }}

      - name: Checkout jobs repo
        uses: actions/checkout@v5
        with:
          repository: zachproffitt/builder-jobs
          path: jobs
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Configure git
        run: |
          git config --global user.name "builder-jobs-bot"
          git config --global user.email "bot@builder-jobs"

      - name: Clear jobs log
        working-directory: scraper
        run: truncate -s 0 data/jobs.log || true

      - name: Fetch jobs
        working-directory: scraper
        run: PYTHONPATH=. python pipeline/fetch_jobs.py

      - name: Checkpoint seen jobs
        working-directory: scraper
        run: |
          git add data/jobs_seen.json data/companies_seen.json
          if git diff --cached --quiet; then
            echo "No new jobs seen"
          else
            git commit -m "Jobs seen — $(date -u '+%b %-d at %H:%M UTC')"
            git pull --rebase --autostash -X theirs
            git push
          fi

      - name: Fetch descriptions
        working-directory: scraper
        run: PYTHONPATH=. python pipeline/fetch_job_descriptions.py

      - name: Classify jobs
        working-directory: scraper
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: PYTHONPATH=. python pipeline/classify_jobs.py

      - name: Checkpoint classify results
        working-directory: scraper
        run: |
          git add data/jobs_classified.json data/jobs_pipeline_stats.json
          if git diff --cached --quiet; then
            echo "No classify changes"
          else
            git commit -m "Classify checkpoint — $(date -u '+%b %-d at %H:%M UTC')"
            git pull --rebase --autostash -X theirs
            git push
          fi

      - name: Classify companies
        working-directory: scraper
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: PYTHONPATH=. python pipeline/classify_companies.py

      - name: Generate index
        working-directory: scraper
        run: PYTHONPATH=. python pipeline/render_job_indexes.py ../jobs

      - name: Commit and push jobs repo
        working-directory: jobs
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "No changes in jobs repo"
          else
            git commit -m "$(date -u '+%b %-d at %H:%M UTC')"
            git pull --rebase --autostash -X theirs
            git push
          fi

      - name: Write step summary
        working-directory: scraper
        run: PYTHONPATH=. python pipeline/render_jobs_pipeline_summary.py

      - name: Update scraper README
        working-directory: scraper
        run: PYTHONPATH=. python pipeline/render_scraper_readme.py

      - name: Commit and push scraper data
        working-directory: scraper
        run: |
          git add data/jobs_seen.json data/companies_seen.json data/jobs_classified.json data/companies_classified.json data/companies.json data/jobs_pipeline_stats.json data/jobs.log README.md
          if git diff --cached --quiet; then
            echo "No changes in scraper data"
          else
            git commit -m "Pipeline data — $(date -u '+%b %-d at %H:%M UTC')"
            git pull --rebase --autostash -X theirs
            git push
          fi
